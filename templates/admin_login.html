<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理者登入</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 100px text-align: center; background-color: #f9f9f9; }
        .login-box { width: 300px; margin: 0 auto; padding: 30px; background: white; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.05); }
        input[type="password"] { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 97%; padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
        button:hover { background-color: #45a049; }
        .error { color: red; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="login-box">
    <h3>🛠️ 管理者後台登入</h3>
    
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <label for="password">請輸入管理員密碼：</label>
        <input type="password" id="password" name="password" placeholder="預設為 admin123" required autofocus>
        <button type="submit">登入後台</button>
    </form>
    <br>
    <a href="/" style="color: #008CBA; text-decoration: none; font-size: 0.9em;">返回學生預約頁</a>
</div>

</body>
</html>
